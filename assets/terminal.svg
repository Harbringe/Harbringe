<svg viewBox="0 0 860 540" width="860" height="540" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code','Fira Code','JetBrains Mono','SF Mono',Consolas,'Liberation Mono',Menlo,monospace">
  <style>
    /* ---------- base ---------- */
    text { font-size: 15px; fill: #c0caf5; white-space: pre; }
    .prompt  { fill: #9ece6a; font-weight: bold; }
    .cmd     { fill: #c0caf5; }
    .dim     { fill: #565f89; }
    .cyan    { fill: #7dcfff; }
    .mag     { fill: #bb9af7; font-weight: bold; }
    .yellow  { fill: #e0af68; }
    .red     { fill: #f7768e; }
    .green   { fill: #9ece6a; }
    .art     { fill: #7dcfff; font-size: 19px; font-weight: bold; }

    /* ---------- typewriter (clip rects grow in steps) ---------- */
    @keyframes type1 { from { width: 0; } to { width: 58px; } }
    @keyframes type2 { from { width: 0; } to { width: 76px; } }
    @keyframes type3 { from { width: 0; } to { width: 194px; } }
    #t1 rect { animation: type1 0.9s steps(6, start) 0.5s both; }
    #t2 rect { animation: type2 1.0s steps(8, start) 2.4s both; }
    #t3 rect { animation: type3 1.4s steps(21, start) 6.2s both; }

    /* ---------- line reveals ---------- */
    @keyframes reveal { from { opacity: 0; } to { opacity: 1; } }
    .r  { animation: reveal 0.05s steps(1, start) both; }
    .d15 { animation-delay: 1.6s; }
    .d36 { animation-delay: 3.6s; }  .d37 { animation-delay: 3.75s; }
    .d39 { animation-delay: 3.9s; }  .d40 { animation-delay: 4.05s; }
    .d42 { animation-delay: 4.2s; }  .d43 { animation-delay: 4.35s; }
    .d45 { animation-delay: 4.5s; }  .d46 { animation-delay: 4.65s; }
    .d48 { animation-delay: 4.8s; }  .d49 { animation-delay: 4.95s; }
    .d51 { animation-delay: 5.1s; }  .d53 { animation-delay: 5.3s; }
    .d55 { animation-delay: 5.55s; }
    .d60 { animation-delay: 6.0s; }
    .d84 { animation-delay: 8.4s; }
    .d89 { animation-delay: 8.9s; }

    /* ---------- blinking cursor ---------- */
    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 95% { opacity: 0; } 100% { opacity: 1; } }
    .cursor { animation: reveal 0.05s steps(1,start) 8.9s both, blink 1.1s step-end 8.9s infinite; }

    /* ---------- invader fires on the rm command ---------- */
    @keyframes laser { 0% { height: 0; opacity: 1; } 70% { height: 127px; opacity: 1; } 100% { height: 127px; opacity: 0; } }
    .laser { animation: laser 0.5s ease-in 7.7s both; filter: drop-shadow(0 0 4px #7dcfff); }
    @keyframes boom { 0% { r: 0; opacity: 0.9; } 60% { r: 10px; opacity: 0.4; } 100% { r: 14px; opacity: 0; } }
    .boom { animation: boom 0.45s ease-out 8.05s both; }
    @keyframes recoil { 0%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    .recoil { animation: recoil 0.4s ease-out 7.7s both; }

    /* ---------- status dot pulse + invader glow ---------- */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    .glow  { filter: drop-shadow(0 0 6px #7dcfff); }
    @keyframes hover { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .invader { animation: hover 3s ease-in-out infinite; }
  </style>

  <!-- window -->
  <rect x="1.5" y="1.5" width="857" height="537" rx="12" fill="#1a1b26" stroke="#414868" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M 1.5 13.5 A 12 12 0 0 1 13.5 1.5 H 846.5 A 12 12 0 0 1 858.5 13.5 V 40 H 1.5 Z" fill="#16161e"/>
  <line x1="1.5" y1="40" x2="858.5" y2="40" stroke="#414868" stroke-width="1"/>
  <circle cx="24" cy="21" r="6.5" fill="#f7768e"/>
  <circle cx="46" cy="21" r="6.5" fill="#e0af68"/>
  <circle cx="68" cy="21" r="6.5" fill="#9ece6a"/>
  <text x="430" y="26" text-anchor="middle" class="dim" font-size="13">aaditya@harbringe: ~</text>

  <!-- ══════════ line 1: whoami ══════════ -->
  <text x="28" y="76" class="prompt">$ </text>
  <clipPath id="t1"><rect x="46" y="60" width="300" height="22"/></clipPath>
  <text x="46" y="76" class="cmd" clip-path="url(#t1)">whoami</text>
  <text x="28" y="101" class="r d15">Aaditya Mehetre <tspan class="dim">::</tspan> AI <tspan class="red">×</tspan> Blockchain Developer</text>

  <!-- ══════════ line 2: neofetch ══════════ -->
  <text x="28" y="136" class="prompt">$ </text>
  <clipPath id="t2"><rect x="46" y="120" width="300" height="22"/></clipPath>
  <text x="46" y="136" class="cmd" clip-path="url(#t2)">neofetch</text>

  <!-- invader art -->
  <g class="recoil">
  <g class="glow">
    <g class="invader">
      <text x="66" y="188" xml:space="preserve" class="art r d36">  ▀▄   ▄▀</text>
      <text x="66" y="210" xml:space="preserve" class="art r d37"> ▄█▀███▀█▄</text>
      <text x="66" y="232" xml:space="preserve" class="art r d39">█▀███████▀█</text>
      <text x="66" y="254" xml:space="preserve" class="art r d40">█ █▀▀▀▀▀█ █</text>
      <text x="66" y="276" xml:space="preserve" class="art r d42"> ▀▀ ▀▀▀ ▀▀</text>
    </g>
  </g>
  </g>
  <text x="115" y="312" text-anchor="middle" class="dim r d43" font-size="13">[ harbringe ]</text>

  <!-- laser shot: invader vaporizes ~/boredom -->
  <rect x="126" y="320" width="3" height="0" rx="1.5" fill="#7dcfff" class="laser"/>
  <circle cx="127.5" cy="449" r="0" fill="#7dcfff" class="boom"/>

  <!-- neofetch info -->
  <text x="300" y="180" xml:space="preserve" class="r d36"><tspan class="cyan" font-weight="bold">aaditya</tspan><tspan class="dim">@</tspan><tspan class="cyan" font-weight="bold">harbringe</tspan></text>
  <text x="300" y="200" xml:space="preserve" class="dim r d37">─────────────────────────────────────────</text>
  <text x="300" y="222" xml:space="preserve" class="r d39"><tspan class="mag">OS</tspan><tspan class="dim">:        </tspan>AadityaOS 22.04 LTS <tspan class="dim">(india build)</tspan></text>
  <text x="300" y="244" xml:space="preserve" class="r d40"><tspan class="mag">Kernel</tspan><tspan class="dim">:    </tspan>AI × Blockchain hybrid core</text>
  <text x="300" y="266" xml:space="preserve" class="r d42"><tspan class="mag">Shell</tspan><tspan class="dim">:     </tspan>python · solidity · javascript</text>
  <text x="300" y="288" xml:space="preserve" class="r d43"><tspan class="mag">Packages</tspan><tspan class="dim">:  </tspan>ml, cnn, rnn, web3, dapps <tspan class="dim">(apt)</tspan></text>
  <text x="300" y="310" xml:space="preserve" class="r d45"><tspan class="mag">Focus</tspan><tspan class="dim">:     </tspan>deep learning &amp; decentralized apps</text>
  <text x="300" y="332" xml:space="preserve" class="r d46"><tspan class="mag">Contact</tspan><tspan class="dim">:   </tspan>aadityamehetre@icloud.com</text>
  <text x="300" y="354" xml:space="preserve" class="r d48"><tspan class="mag">Status</tspan><tspan class="dim">:    </tspan><tspan class="green pulse">●</tspan> compiling dreams…</text>

  <!-- neofetch palette -->
  <g class="r d51">
    <rect x="300" y="370" width="22" height="12" fill="#f7768e"/>
    <rect x="326" y="370" width="22" height="12" fill="#e0af68"/>
    <rect x="352" y="370" width="22" height="12" fill="#9ece6a"/>
    <rect x="378" y="370" width="22" height="12" fill="#7dcfff"/>
    <rect x="404" y="370" width="22" height="12" fill="#bb9af7"/>
    <rect x="430" y="370" width="22" height="12" fill="#7aa2f7"/>
    <rect x="456" y="370" width="22" height="12" fill="#c0caf5"/>
    <rect x="482" y="370" width="22" height="12" fill="#565f89"/>
  </g>

  <!-- ══════════ line 3: rm boredom ══════════ -->
  <g class="r d60">
    <text x="28" y="430" class="prompt">$ </text>
  </g>
  <clipPath id="t3"><rect x="46" y="414" width="300" height="22"/></clipPath>
  <text x="46" y="430" clip-path="url(#t3)"><tspan class="yellow">sudo</tspan><tspan class="cmd"> rm -rf ~/boredom</tspan></text>
  <text x="28" y="455" class="r d84"><tspan class="dim">removed '</tspan><tspan class="red">boredom</tspan><tspan class="dim">' — nothing of value was lost</tspan> <tspan class="green">✔</tspan></text>

  <!-- ══════════ final prompt + cursor ══════════ -->
  <text x="28" y="490" class="prompt r d89">$ </text>
  <rect x="48" y="477" width="9" height="17" fill="#c0caf5" class="cursor"/>

  <!-- CRT scanlines -->
  <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1.5" fill="#000000" opacity="0.09"/>
  </pattern>
  <rect x="1.5" y="1.5" width="857" height="537" rx="12" fill="url(#scan)" pointer-events="none"/>
</svg>
